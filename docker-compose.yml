services:
  # Init container for one-time setup tasks (migrations, superuser creation)
  init:
    build:
      context: .
      target: development
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        GIT_SHA: ${GIT_SHA:-unknown}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - erechnung-network
    restart: "no"  # Only run once
    command: ["./scripts/init_django.sh"]

  web:
    build:
      context: .
      target: development
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        GIT_SHA: ${GIT_SHA:-unknown}
    ports:
      - "8000:8000"
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./project_root:/app/project_root:z
      - ./project_root/schemas:/app/project_root/schemas:ro,z
      - ./infra/postgres:/app/postgres:ro,z  # pgTAP SQL tests (read-only)
      - ./logs:/app/logs:z
    networks:
      - erechnung-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "project_root/manage.py", "check", "--database", "default"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    build: ./infra/postgres  # Custom image with pgTAP + extensions (based on postgres:17)
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/certs/server.crt
      -c ssl_key_file=/var/lib/postgresql/certs/server.key
      -c ssl_ca_file=/var/lib/postgresql/certs/ca.crt
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./infra/postgres/certs:/var/lib/postgresql/certs-mounted:ro,z
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - erechnung-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $POSTGRES_DB -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - erechnung-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery:
    build:
      context: .
      target: development
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        GIT_SHA: ${GIT_SHA:-unknown}
    command: celery -A project_root.invoice_project worker -l info
    env_file:
      - .env
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erechnung-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "project_root.invoice_project", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Vue.js Frontend - Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: erechnung_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Mount node_modules from host (instead of anonymous volume)
      - ./frontend/node_modules:/app/node_modules
      - ./frontend/.env.development:/app/.env.development
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost:8000/api
    networks:
      - erechnung-network
    restart: unless-stopped

networks:
  erechnung-network:
    driver: bridge
    name: erechnung-network

volumes:
  postgres_data:
  redis_data:
