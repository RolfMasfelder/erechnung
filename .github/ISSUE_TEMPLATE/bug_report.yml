name: Bug Report
description: Report a bug or unexpected behavior
labels: [ "bug", "needs-triage" ]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        Please fill out all sections as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Create an invoice with '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application is affected?
      options:
        - Invoice creation / editing
        - PDF generation
        - ZUGFeRD / Factur-X XML
        - Import (incoming invoices)
        - Export / Download
        - Business partners
        - User management
        - API
        - Frontend / UI
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, browser, OS — anything relevant.
      placeholder: |
        - Version: v0.x.y (see Settings → About or git tag)
        - Browser: Chrome 124 / Firefox 126
        - OS: Ubuntu 24.04 / Windows 11
        - Deployment: Docker Compose / Kubernetes
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      description: Paste any relevant log output. Wrap in triple backticks for formatting.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest version.
          required: false
