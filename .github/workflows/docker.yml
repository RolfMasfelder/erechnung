name: Docker Build and Publish

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM
  push:
    tags: [ 'v*' ]  # Trigger on version tags
  pull_request:
    branches: [ main ]

jobs:

  build-test:
    name: Docker Build Test (AMD64)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build (AMD64 only, no push)
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64
        target: production
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max

  publish-release:
    name: Publish Release Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for Cosign keyless signing

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build and push release image
      uses: docker/build-push-action@v7
      with:
        context: .
        target: production
        platforms: linux/amd64
        push: true
        tags: |
          ghcr.io/rolfmasfelder/erechnung-django-app:${{ steps.version.outputs.VERSION }}
          ghcr.io/rolfmasfelder/erechnung-django-app:latest
        labels: |
          org.opencontainers.image.title=eRechnung Django App
          org.opencontainers.image.description=German e-invoicing system with ZUGFeRD/Factur-X
          org.opencontainers.image.source=https://github.com/RolfMasfelder/erechnung
          org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
          org.opencontainers.image.revision=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign container image with Cosign (keyless)
      env:
        COSIGN_EXPERIMENTAL: "true"
      run: |
        cosign sign --yes \
          ghcr.io/rolfmasfelder/erechnung-django-app:${{ steps.version.outputs.VERSION }}
        cosign sign --yes \
          ghcr.io/rolfmasfelder/erechnung-django-app:latest

    - name: Verify image signature
      env:
        COSIGN_EXPERIMENTAL: "true"
      run: |
        cosign verify \
          --certificate-identity-regexp="https://github.com/RolfMasfelder/erechnung" \
          --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
          ghcr.io/rolfmasfelder/erechnung-django-app:${{ steps.version.outputs.VERSION }}
