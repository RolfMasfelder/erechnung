name: Dependency Updates

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM
  workflow_dispatch:

# Explicit permissions (required for create-pull-request to be able to push a branch & open PR)
permissions:
  contents: write      # allow pushing the chore/update-dependencies branch
  pull-requests: write # allow opening / updating the PR

jobs:
  update-dependencies:
    name: Update Python Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: Install pip-tools
      run: pip install pip-tools

    - name: Update requirements (pip-compile)
      run: |
        if [ -f requirements.in ]; then
          echo "Running pip-compile on requirements.in";
          pip-compile --upgrade requirements.in;
        else
          echo "requirements.in missing (unexpected) - aborting." 1>&2
          exit 1
        fi

    - name: Check for security vulnerabilities
      run: |
        pip install pip-audit
        pip-audit --requirement requirements.txt --format=json --output=audit-results.json || true

    - name: Upload security audit results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: dependency-security-audit
        path: audit-results.json

    - name: Remove audit file (do not commit artifact into repo)
      run: rm -f audit-results.json || true

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        # NOTE: If this step fails with:
        #   "GitHub Actions is not permitted to create or approve pull requests."
        # then enable the repository setting:
        #   Settings -> Actions -> General -> Workflow permissions -> Read and write permissions
        # AND check the box: "Allow GitHub Actions to create and approve pull requests".
        # Alternatively provide a fine-grained PAT in a secret (e.g. PR_CREATION_TOKEN) and switch token to that.
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Python dependencies'
        title: 'chore: update Python dependencies'
        body: |
          Automated update of Python dependencies.

          - Updated requirements.txt with latest versions
          - Security vulnerabilities checked with pip-audit (JSON report attached as artifact; not committed)
          - Please review changes before merging
          - Generated by scheduled dependency maintenance workflow
        branch: chore/update-dependencies
        delete-branch: true
        labels: dependencies, automation, chore
        signoff: false

  update-frontend-dependencies:
    name: Update Frontend (npm) Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Update npm dependencies
      working-directory: frontend
      run: |
        npm update --omit=optional
        npm audit fix --omit=optional || true

    - name: Run npm audit
      working-directory: frontend
      run: |
        npm audit --json > npm-audit-results.json || true
        # Summary
        python3 -c "
        import json, sys
        try:
            with open('npm-audit-results.json') as f:
                data = json.load(f)
            vulns = data.get('metadata', {}).get('vulnerabilities', {})
            total = sum(vulns.values())
            if total > 0:
                print(f'npm audit: {total} vulnerabilities')
                for sev, count in vulns.items():
                    if count > 0:
                        print(f'  - {sev}: {count}')
            else:
                print('No known vulnerabilities in npm dependencies')
        except Exception as e:
            print(f'Could not parse npm audit results: {e}')
        "

    - name: Upload npm audit results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: npm-audit-report
        path: frontend/npm-audit-results.json
        retention-days: 30

    - name: Remove audit file
      run: rm -f frontend/npm-audit-results.json || true

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update frontend npm dependencies'
        title: 'chore: update frontend npm dependencies'
        body: |
          Automated update of frontend npm dependencies.

          - Updated package.json and package-lock.json
          - Security vulnerabilities checked with npm audit (JSON report attached as artifact)
          - Please review changes before merging
        branch: chore/update-frontend-dependencies
        delete-branch: true
        labels: dependencies, automation, chore, frontend
        signoff: false
