# Kubernetes manifests for eRechnung - kind local version
# Uses locally built images instead of ghcr.io registry
# Based on k8s-erechnung.yaml with image modifications

# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: erechnung
  labels:
    # Pod Security Standards (Phase 1 - Security Implementation)
    # enforce: Violations will cause the pod to be rejected
    # audit: Violations will trigger an audit annotation but allow the pod
    # warn: Violations will trigger a user-facing warning but allow the pod
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

---
# ConfigMap für Environment-Variablen
apiVersion: v1
kind: ConfigMap
metadata:
  name: erechnung-config
  namespace: erechnung
data:
  DJANGO_ENV: "production"  # Phase 1: Enable HTTPS Security Settings
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: "*"
  # Python configuration
  PYTHONPATH: "/app/project_root"
  PYTHONUNBUFFERED: "1"
  DJANGO_SETTINGS_MODULE: "invoice_project.settings"
  # Database connection - use POSTGRES_* variables (primary in settings.py)
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "erechnung"
  # Fallback DB_* variables for compatibility
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "erechnung"
  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  # Paths
  GHOSTSCRIPT_PATH: "/usr/bin/gs"
  MEDIA_ROOT: "/app/project_root/media"
  STATIC_ROOT: "/app/static"
  # Environment flags
  IS_DOCKER: "true"
  BEHIND_GATEWAY: "true"

---
# Secret für sensitive Daten
apiVersion: v1
kind: Secret
metadata:
  name: erechnung-secrets
  namespace: erechnung
type: Opaque
data:
  # Base64-encoded secrets - in Production durch echte Werte ersetzen
  DJANGO_SECRET_KEY: ZGphbmdvLWluc2VjdXJlLWNoYW5nZS1tZS1pbi1wcm9kdWN0aW9u
  DB_USER: cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXNfcGFzc3dvcmQ=
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXNfcGFzc3dvcmQ=
  POSTGRES_DB: ZXJlY2hudW5n

---
# PostgreSQL PersistentVolume
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: erechnung
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# Redis PersistentVolume
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: erechnung
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: erechnung
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # DEVELOPMENT ONLY: Relaxed Security for Postgres in kind
      # kind local volumes don't support fsGroup properly
      # In production Kubernetes, use proper SecurityContext with runAsUser: 70
      containers:
      - name: postgres
        image: 192.168.178.80:5000/postgres:17
        imagePullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: erechnung-secrets
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: erechnung
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: erechnung
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      # Pod Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 999  # Redis default user
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: redis
        image: 192.168.178.80:5000/redis:7-alpine
        imagePullPolicy: IfNotPresent
        # Container Security Context
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # Redis needs write access
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: erechnung
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
# Django Init Job
apiVersion: batch/v1
kind: Job
metadata:
  name: django-init
  namespace: erechnung
spec:
  template:
    metadata:
      labels:
        app: django-web
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-db
        image: 192.168.178.80:5000/busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for db; sleep 2; done;']
      containers:
      - name: django-init
        image: 192.168.178.80:5000/erechnung-init:KUSTOMIZE
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            echo "Running migrations..." &&
            python project_root/manage.py migrate --noinput &&
            echo "Collecting static files..." &&
            python project_root/manage.py collectstatic --noinput &&
            echo "Creating admin user (DEVELOPMENT ONLY - REMOVE FOR PRODUCTION)..." &&
            python project_root/manage.py shell << 'EOF'
            from django.contrib.auth import get_user_model
            User = get_user_model()

            # Create superuser for admin access (DEVELOPMENT ONLY)
            if not User.objects.filter(username="admin").exists():
                User.objects.create_superuser("admin", "admin@example.com", "admin")
                print("✓ Superuser created: admin/admin")
            else:
                print("✓ Superuser already exists")
            EOF
            echo "Creating test data (DEVELOPMENT ONLY)..." &&
            python project_root/manage.py create_test_data --count 10
        envFrom:
        - configMapRef:
            name: erechnung-config
        - secretRef:
            name: erechnung-secrets

---
# Django Web Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-web
  namespace: erechnung
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-web
  template:
    metadata:
      labels:
        app: django-web
    spec:
      # Pod Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: django-web
        image: 192.168.178.80:5000/erechnung-web:KUSTOMIZE
        imagePullPolicy: IfNotPresent
        # Container Security Context
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # Django needs write to /tmp, /media
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: erechnung-config
        - secretRef:
            name: erechnung-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
# Django Web Service
apiVersion: v1
kind: Service
metadata:
  name: django-web-service
  namespace: erechnung
spec:
  selector:
    app: django-web
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP

---
# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: erechnung
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      # Pod Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: celery-worker
        image: 192.168.178.80:5000/erechnung-celery:KUSTOMIZE
        imagePullPolicy: IfNotPresent
        command: ["celery", "-A", "invoice_project", "worker", "-l", "info", "--concurrency=4"]
        # Container Security Context
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # Celery needs write access
        envFrom:
        - configMapRef:
            name: erechnung-config
        - secretRef:
            name: erechnung-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: erechnung
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      # DEVELOPMENT ONLY: Relaxed Security for nginx in kind
      # kind has permission issues with nginx cache directories
      # In production, use proper SecurityContext with runAsUser: 101
      containers:
      - name: nginx
        image: 192.168.178.80:5000/nginx:alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config

---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: erechnung
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: erechnung
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # DEVELOPMENT ONLY: Relaxed Security for nginx in kind
      # kind has permission issues with nginx cache directories
      # In production, use proper SecurityContext with runAsUser: 101
      containers:
      - name: frontend
        image: 192.168.178.80:5000/erechnung-frontend:KUSTOMIZE
        imagePullPolicy: IfNotPresent  # Don't try to pull
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: erechnung
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

---
# Nginx ConfigMap (proxy config with SPA routing)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: erechnung
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        upstream django_backend {
            server django-web-service:8000;
        }
        upstream frontend_service {
            server frontend-service:80;
        }
        server {
            listen 8080;

            # API requests to Django backend
            location /api/ {
                proxy_pass http://django_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
            }

            # Django Admin
            location /admin/ {
                proxy_pass http://django_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
            }

            # Django Static Files
            location /static/ {
                proxy_pass http://django_backend;
                proxy_set_header Host $host;
            }

            # Django Media Files
            location /media/ {
                proxy_pass http://django_backend;
                proxy_set_header Host $host;
            }

            # All other requests to Vue.js Frontend (SPA)
            location / {
                proxy_pass http://frontend_service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
            }
        }
    }
