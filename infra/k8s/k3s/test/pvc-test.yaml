# PVCs für Test-Namespace (kleine Größen)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: erechnung-update-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: erechnung-update-test
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
