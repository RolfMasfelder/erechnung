# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: erechnung
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        # Opt out of Linkerd sidecar injection (stateful service)
        linkerd.io/inject: disabled
    spec:
      # DEVELOPMENT ONLY: Relaxed Security for Postgres on this local k3s setup
      # In production Kubernetes, use strict SecurityContext with dedicated UID/GID
      containers:
      - name: postgres
        image: 192.168.178.80:5000/erechnung-postgres:KUSTOMIZE
        imagePullPolicy: IfNotPresent
        args:
          - "-c"
          - "shared_preload_libraries=pg_stat_statements"
          - "-c"
          - "ssl=on"
          - "-c"
          - "ssl_cert_file=/var/lib/postgresql/certs/server.crt"
          - "-c"
          - "ssl_key_file=/var/lib/postgresql/certs/server.key"
          - "-c"
          - "ssl_ca_file=/var/lib/postgresql/certs/ca.crt"
        envFrom:
        - secretRef:
            name: erechnung-secrets
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-tls
          mountPath: /var/lib/postgresql/certs-mounted
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: postgres-tls
        secret:
          secretName: postgres-tls-certs
          defaultMode: 0644
          items:
          - key: tls.crt
            path: server.crt
          - key: tls.key
            path: server.key
          - key: ca.crt
            path: ca.crt
