# External Secrets Operator (ESO) Configuration
# Provides a path to integrate external secret stores (Vault, AWS SM, etc.)
# with Kubernetes secrets.
#
# Prerequisites:
#   1. Install ESO via Helm:
#      helm repo add external-secrets https://charts.external-secrets.io
#      helm install external-secrets external-secrets/external-secrets \
#        -n external-secrets --create-namespace
#
#   2. Set up a secret backend (e.g., HashiCorp Vault):
#      See docs/SECURITY.md for Vault setup instructions.
#
#   3. Apply these manifests:
#      kubectl apply -f infra/k8s/k3s/manifests/13-external-secrets.yaml
#
# Migration Strategy:
#   Phase 1 (current): Plain K8s Secret (11-secret-erechnung-secrets.yaml)
#   Phase 2: ESO with Kubernetes backend (secrets stored in a dedicated ns)
#   Phase 3: ESO with Vault backend (full external secret management)
---
# Phase 2: Kubernetes-backend SecretStore
# Uses secrets from a dedicated 'secret-store' namespace as the source.
# This is a stepping stone before Vault — secrets are still in K8s
# but managed separately from the application namespace.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: kubernetes-backend
  namespace: erechnung
spec:
  provider:
    kubernetes:
      remoteNamespace: secret-store
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-service-account
---
# Phase 3: Vault SecretStore (uncomment when Vault is available)
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: vault-backend
#   namespace: erechnung
# spec:
#   provider:
#     vault:
#       server: "http://vault.vault-system.svc:8200"
#       path: "secret"
#       version: "v2"
#       auth:
#         kubernetes:
#           mountPath: "kubernetes"
#           role: "erechnung"
#           serviceAccountRef:
#             name: erechnung-web
---
# ExternalSecret: Replaces 11-secret-erechnung-secrets.yaml
# When active, ESO syncs secrets from the configured backend
# into a K8s Secret named 'erechnung-secrets'.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: erechnung-secrets
  namespace: erechnung
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-backend  # Change to vault-backend for Phase 3
    kind: SecretStore
  target:
    name: erechnung-secrets  # Same name as existing secret
    creationPolicy: Owner
  data:
  - secretKey: DJANGO_SECRET_KEY
    remoteRef:
      key: erechnung-secrets
      property: DJANGO_SECRET_KEY
  - secretKey: DB_USER
    remoteRef:
      key: erechnung-secrets
      property: DB_USER
  - secretKey: DB_PASSWORD
    remoteRef:
      key: erechnung-secrets
      property: DB_PASSWORD
  - secretKey: POSTGRES_USER
    remoteRef:
      key: erechnung-secrets
      property: POSTGRES_USER
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: erechnung-secrets
      property: POSTGRES_PASSWORD
  - secretKey: POSTGRES_DB
    remoteRef:
      key: erechnung-secrets
      property: POSTGRES_DB
---
# ServiceAccount for ESO to read from secret-store namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-service-account
  namespace: erechnung
---
# Namespace for the secret source (Phase 2)
apiVersion: v1
kind: Namespace
metadata:
  name: secret-store
  labels:
    app.kubernetes.io/managed-by: external-secrets
---
# RBAC: Allow ESO to read secrets from secret-store namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-secret-reader
  namespace: secret-store
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-secret-reader-binding
  namespace: secret-store
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-secret-reader
subjects:
- kind: ServiceAccount
  name: eso-service-account
  namespace: erechnung
