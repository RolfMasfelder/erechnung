# -------------------------------------------------------------------
# Alertmanager — Alert routing → SMTP/IONOS
# Decision: ADR-016 (Monitoring Stack Selection)
# Secrets:  infra/k8s/k3s/secrets/alertmanager-smtp.sealed.yaml
#           (Sealed Secret managed by Bitnami Sealed Secrets controller)
# -------------------------------------------------------------------

# ConfigMap: alertmanager.yml configuration
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app: alertmanager
    component: monitoring
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: smtp.ionos.de:587
      smtp_from: github@nector-it-gmbh.de
      smtp_auth_username: github@nector-it-gmbh.de
      # Password read from file mounted via Sealed Secret
      smtp_auth_password_file: /etc/alertmanager/secrets/smtp_password
      smtp_require_tls: true
      resolve_timeout: 5m

    route:
      receiver: ops-mail
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        # Critical alerts: immediate, shorter repeat
        - matchers:
            - severity="critical"
          receiver: ops-mail
          group_wait: 10s
          repeat_interval: 1h

    receivers:
      - name: ops-mail
        email_configs:
          - to: ops@nector-it-gmbh.de
            send_resolved: true
            headers:
              Subject: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'

    inhibit_rules:
      # Suppress warnings when a critical alert is already firing for the same service
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname']

---
# Persistent storage for Alertmanager silences / notification log
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-data
  namespace: monitoring
  labels:
    app: alertmanager
    component: monitoring
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
    component: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC is ReadWriteOnce
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        component: monitoring
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534  # nobody
        fsGroup: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.32.1
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.listen-address=:9093"
            - "--web.external-url=http://192.168.178.200/alertmanager/"
            - "--web.route-prefix=/alertmanager/"
          ports:
            - containerPort: 9093
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: smtp-secret
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /alertmanager/-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /alertmanager/-/healthy
              port: 9093
            initialDelaySeconds: 20
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: smtp-secret
          secret:
            # Created via: kubectl create secret generic alertmanager-smtp
            #              --from-literal=smtp_password=<password>
            # Sealed via:  scripts/seal-secret.sh (see ADR-012)
            # Stored as:   infra/k8s/k3s/secrets/alertmanager-smtp.sealed.yaml
            secretName: alertmanager-smtp
        - name: data
          persistentVolumeClaim:
            claimName: alertmanager-data

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
    component: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 9093
      name: http
  selector:
    app: alertmanager
