# PostgreSQL TLS Certificate (issued by erechnung-ca-issuer)
# Provides server certificate for encrypted PostgreSQL connections.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: postgres-tls
  namespace: erechnung
spec:
  secretName: postgres-tls-certs
  duration: 8760h  # 1 year
  renewBefore: 720h  # 30 days before expiry
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
  commonName: postgres-service
  dnsNames:
    - postgres-service
    - postgres-service.erechnung.svc.cluster.local
    - postgres
  issuerRef:
    name: erechnung-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
