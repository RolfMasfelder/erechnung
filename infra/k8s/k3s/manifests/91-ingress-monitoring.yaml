# Ingress for Monitoring UIs (Grafana + Prometheus)
# Access via https://monitoring.erechnung.local/grafana/ and .../prometheus/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "erechnung-ca-issuer"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - monitoring.erechnung.local
    secretName: monitoring-tls
  rules:
  - host: monitoring.erechnung.local
    http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
      - path: /alertmanager
        pathType: Prefix
        backend:
          service:
            name: alertmanager
            port:
              number: 9093
