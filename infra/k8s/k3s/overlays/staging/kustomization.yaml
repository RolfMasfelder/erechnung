# =============================================================================
# Staging Overlay — Namespace erechnung-staging
# =============================================================================
# Vollständiger eRechnung-Stack mit Testdaten + DEBUG=True.
# Gedacht für E2E-Tests und manuelle QA gegen produktionsnahe Konfiguration.
#
# Usage:
#   kubectl apply -k infra/k8s/k3s/overlays/staging/
#   kubectl delete -k infra/k8s/k3s/overlays/staging/
#
# Unterschiede zur Produktion (erechnung):
#   - Namespace: erechnung-staging
#   - INIT_CREATE_TEST_DATA=true  → generate_test_data --preset standard
#   - INIT_CREATE_ADMIN=true      → admin/admin Benutzer
#   - DJANGO_DEBUG=True           → media files werden von Django serviert
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: erechnung-staging

resources:
  - namespace.yaml
  - ../../manifests/10-configmap-erechnung-config.yaml
  - ../../manifests/11-secret-erechnung-secrets.yaml
  - ../../manifests/20-pvc-postgres.yaml
  - ../../manifests/21-pvc-redis.yaml
  - ../../manifests/22-pvc-media.yaml
  - ../../manifests/30-deploy-postgres.yaml
  - ../../manifests/31-svc-postgres.yaml
  - ../../manifests/32-deploy-redis.yaml
  - ../../manifests/33-svc-redis.yaml
  - ../../manifests/40-job-django-init.yaml
  - ../../manifests/50-deploy-django-web.yaml
  - ../../manifests/51-svc-django-web.yaml
  - ../../manifests/52-deploy-celery-worker.yaml
  - ../../manifests/60-deploy-api-gateway.yaml
  - ../../manifests/61-svc-api-gateway.yaml
  - ../../manifests/70-deploy-frontend.yaml
  - ../../manifests/71-svc-frontend.yaml
  - ../../manifests/80-configmap-nginx.yaml
  - ingress.yaml

patches:
  - path: patch-configmap.yaml
    target:
      kind: ConfigMap
      name: erechnung-config
  - path: patch-postgres-no-tls.yaml
    target:
      kind: Deployment
      name: postgres
  - path: patch-init-no-tls.yaml
    target:
      kind: Job
      name: django-init
  - path: patch-django-no-tls.yaml
    target:
      kind: Deployment
      name: django-web
  - path: patch-celery-no-tls.yaml
    target:
      kind: Deployment
      name: celery-worker

images:
  - name: 192.168.178.80:5000/erechnung-web
    newTag: v0.1.3-9ac3096
  - name: 192.168.178.80:5000/erechnung-init
    newTag: v0.1.3-9ac3096
  - name: 192.168.178.80:5000/erechnung-celery
    newTag: v0.1.3-9ac3096
  - name: 192.168.178.80:5000/erechnung-frontend
    newTag: v0.1.3-9ac3096
  - name: 192.168.178.80:5000/erechnung-api-gateway
    newTag: v0.1.3-9ac3096
  - name: 192.168.178.80:5000/erechnung-postgres
    newTag: v0.1.3-9ac3096
