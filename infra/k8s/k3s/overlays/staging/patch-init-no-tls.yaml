# Remove postgres CA cert volume/mount from django-init job in staging
apiVersion: batch/v1
kind: Job
metadata:
  name: django-init
spec:
  template:
    spec:
      containers:
      - name: django-init
        volumeMounts:
        - mountPath: /etc/ssl/postgres
          $patch: delete
      volumes:
      - name: postgres-ca
        $patch: delete
