# API Gateway Virtual Host Configuration
# Handles routing, rate limiting, and security for eRechnung API

server {
    listen 8080;
    server_name api-gateway;

    # ===========================================
    # Security Headers (OWASP Recommended)
    # ===========================================
    # Prevent clickjacking attacks
    # Note: Global nginx.conf already sets X-Frame-Options DENY; avoid duplicate/conflicting headers here.
    # add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filter (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # HTTP Strict Transport Security (HSTS)
    # Uncomment for production with valid SSL certificate
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy (formerly Feature-Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy (basic - adjust for your needs)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Client request limits
    client_max_body_size 50M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Gateway-level health check (nginx itself, no backend dependency)
    location = /gateway-health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","component":"api-gateway"}';
    }

    # Health endpoints - all proxied to Django backend
    location = /health {
        access_log off;
        limit_req zone=health_limit burst=20 nodelay;
        proxy_pass http://django_backend/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Quick health check timeouts
        proxy_connect_timeout 2s;
        proxy_send_timeout 2s;
        proxy_read_timeout 2s;
    }

    location = /health/ {
        access_log off;
        limit_req zone=health_limit burst=20 nodelay;
        proxy_pass http://django_backend/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Quick health check timeouts
        proxy_connect_timeout 2s;
        proxy_send_timeout 2s;
        proxy_read_timeout 2s;
    }

    # Detailed backend health check (for CI/CD)
    location = /health/detailed/ {
        access_log off;
        proxy_pass http://django_backend/health/detailed/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Detailed health check timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Readiness check endpoint
    location = /health/readiness/ {
        access_log off;
        proxy_pass http://django_backend/health/readiness/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Quick readiness check timeouts
        proxy_connect_timeout 2s;
        proxy_send_timeout 2s;
        proxy_read_timeout 2s;
    }

    # JWT Authentication endpoints - stricter rate limiting
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Gateway-Route "auth";

        # Auth timeout settings
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # API documentation endpoints (public, no JWT required)
    location /api/docs/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Gateway-Route "docs";
    }

    location /api/schema/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Gateway-Route "docs";
    }

    # Admin interface - very strict rate limiting
    location /admin/ {
        limit_req zone=admin_limit burst=5 nodelay;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Gateway-Route "admin";

        # Admin security headers
        add_header X-Admin-Access "gateway-protected";
    }

    # API endpoints - standard rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        # JWT validation at the perimeter (Defense-in-Depth)
        # Rejects invalid/expired tokens before they reach Django
        access_by_lua_file /etc/nginx/lua/jwt_validator.lua;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Gateway-Route "api";

        # API timeout settings
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Static files - served directly by nginx (faster than proxy)
    location /static/ {
        alias /app/static/;

        # Security: only serve specific file types
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # Media files - served directly by nginx
    location /media/ {
        alias /app/project_root/media/;

        # No caching for user-uploaded content
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        # Security headers for downloads
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Root redirect to API documentation (drf-spectacular Swagger UI)
    location = / {
        return 302 /api/docs/;
    }

    # Block direct access to sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Default error handling
    error_page 429 /errors/rate_limit.json;
    error_page 502 503 504 /errors/backend_error.json;

    location /errors/ {
        internal;
        root /usr/share/nginx/html;
    }
}
