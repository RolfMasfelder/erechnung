# API Gateway Configuration for eRechnung
# Routes requests to Django backend with rate limiting and security
# Uses OpenResty (nginx + Lua) for perimeter JWT validation

events {
    worker_connections 1024;
}

http {
    # Basic settings
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

    # Lua module paths (OpenResty + opm packages)
    lua_package_path "/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/lualib/?.lua;/etc/nginx/lua/?.lua;;";
    lua_package_cpath "/usr/local/openresty/site/lualib/?.so;/usr/local/openresty/lualib/?.so;;";

    # Shared dictionary for JWT configuration (1MB)
    lua_shared_dict jwt_config 1m;

    # Initialize JWT secret from environment variable at startup
    init_by_lua_block {
        local secret = os.getenv("JWT_SIGNING_KEY")
        if secret and secret ~= "" then
            ngx.shared.jwt_config:set("secret", secret)
            ngx.log(ngx.NOTICE, "JWT gateway validation enabled (Defense-in-Depth)")
        else
            ngx.log(ngx.WARN, "JWT_SIGNING_KEY not set — gateway JWT validation disabled")
        end
    }

    # Logging
    log_format api_gateway '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time uct="$upstream_connect_time" '
                          'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/api-gateway/access.log api_gateway;
    error_log  /var/log/nginx/api-gateway/error.log warn;

    # Performance settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=health_limit:10m rate=10r/s;

    # Backend upstream
    upstream django_backend {
        server web:8000;  # Internal Docker network - matches service name
        keepalive 32;
    }

    # Include API Gateway virtual host
    include /etc/nginx/conf.d/*.conf;
}
