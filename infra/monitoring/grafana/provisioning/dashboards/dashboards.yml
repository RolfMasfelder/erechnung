# Grafana dashboard provisioning
# Auto-loads dashboards from the /var/lib/grafana/dashboards directory
apiVersion: 1

providers:
  - name: "eRechnung Dashboards"
    orgId: 1
    folder: "eRechnung"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
