# Prometheus alerting and recording rules for eRechnung
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/
groups:
  # =====================================================================
  # Recording Rules — pre-computed metrics for SLO dashboards
  # =====================================================================
  - name: erechnung_recording
    interval: 30s
    rules:
      # p95 request latency over 5 min window (used in SLO dashboard)
      - record: job:http_request_duration_seconds:p95_5m
        expr: >
          histogram_quantile(0.95,
            sum by (le, job) (
              rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])
            )
          )

      # p50 request latency over 5 min window
      - record: job:http_request_duration_seconds:p50_5m
        expr: >
          histogram_quantile(0.50,
            sum by (le, job) (
              rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])
            )
          )

      # p99 request latency over 5 min window
      - record: job:http_request_duration_seconds:p99_5m
        expr: >
          histogram_quantile(0.99,
            sum by (le, job) (
              rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])
            )
          )

      # HTTP 5xx error ratio over 5 min window
      - record: job:http_request_errors:rate5m
        expr: >
          sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[5m]))
          /
          sum(rate(django_http_responses_total_by_status_total[5m]))

      # Invoice creation rate per hour
      - record: job:invoices_created:rate1h
        expr: >
          sum(increase(erechnung_invoices_created_total[1h]))

  # =====================================================================
  # Application Health
  # =====================================================================
  - name: erechnung_health
    rules:
      - alert: DjangoDown
        expr: up{job="django"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Django backend is down"
          description: "The Django backend has been unreachable for more than 2 minutes."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/DjangoDown.md"

      - alert: HighErrorRate
        expr: >
          rate(django_http_responses_total_by_status_total{status=~"5.."}[5m])
          / rate(django_http_responses_total_by_status_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate (> 5%)"
          description: "More than 5% of HTTP requests are returning 5xx errors."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/HighErrorRate.md"

      - alert: HighRequestLatency
        expr: >
          histogram_quantile(0.95, rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency (p95 > 2s)"
          description: "95th percentile request latency exceeds 2 seconds."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/HighRequestLatency.md"

  # =====================================================================
  # Business KPIs
  # =====================================================================
  - name: erechnung_business
    rules:
      - alert: OverdueInvoicesHigh
        expr: erechnung_invoices_overdue_count > 10
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Many overdue invoices ({{ $value }})"
          description: "More than 10 invoices are past their due date."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/OverdueInvoicesHigh.md"

      - alert: PDFGenerationFailureRate
        expr: >
          rate(erechnung_pdf_generation_total{result="error"}[15m])
          / rate(erechnung_pdf_generation_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PDF generation failure rate > 10%"
          description: "More than 10% of PDF generation attempts are failing."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/PDFGenerationFailureRate.md"

      - alert: PDFGenerationSlow
        expr: >
          histogram_quantile(0.95, rate(erechnung_pdf_generation_duration_seconds_bucket[15m])) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PDF generation is slow (p95 > 5s)"
          description: "95th percentile PDF generation time exceeds 5 seconds."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/PDFGenerationSlow.md"

      - alert: XMLValidationErrors
        expr: rate(erechnung_xml_validation_errors_total[15m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High XML validation error rate"
          description: "XML validation errors are occurring frequently."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/XMLValidationErrors.md"

  # =====================================================================
  # Infrastructure
  # =====================================================================
  - name: erechnung_infrastructure
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter has been unreachable for over 1 minute."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/PostgresDown.md"

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis exporter has been unreachable for over 1 minute."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/RedisDown.md"

      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High PostgreSQL connection count ({{ $value }})"
          description: "PostgreSQL has more than 80 active connections."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/HighDatabaseConnections.md"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 85%"
          description: "Redis is using more than 85% of its configured maximum memory."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/RedisMemoryHigh.md"

      - alert: HighCeleryTaskFailureRate
        expr: >
          rate(erechnung_celery_task_total{result="failure"}[15m])
          / rate(erechnung_celery_task_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Celery task failure rate > 10%"
          description: "More than 10% of Celery tasks are failing."
          runbook_url: "https://github.com/RolfMasfelder/erechnung/blob/main/docs/runbooks/HighCeleryTaskFailureRate.md"
