# Prometheus alerting rules for eRechnung
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/
groups:
  # =====================================================================
  # Application Health
  # =====================================================================
  - name: erechnung_health
    rules:
      - alert: DjangoDown
        expr: up{job="django"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Django backend is down"
          description: "The Django backend has been unreachable for more than 2 minutes."

      - alert: HighErrorRate
        expr: >
          rate(django_http_responses_total_by_status_total{status=~"5.."}[5m])
          / rate(django_http_responses_total_by_status_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate (> 5%)"
          description: "More than 5% of HTTP requests are returning 5xx errors."

      - alert: HighRequestLatency
        expr: >
          histogram_quantile(0.95, rate(django_http_requests_latency_seconds_by_view_method_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency (p95 > 2s)"
          description: "95th percentile request latency exceeds 2 seconds."

  # =====================================================================
  # Business KPIs
  # =====================================================================
  - name: erechnung_business
    rules:
      - alert: OverdueInvoicesHigh
        expr: erechnung_invoices_overdue_count > 10
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Many overdue invoices ({{ $value }})"
          description: "More than 10 invoices are past their due date."

      - alert: PDFGenerationFailureRate
        expr: >
          rate(erechnung_pdf_generation_total{result="error"}[15m])
          / rate(erechnung_pdf_generation_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PDF generation failure rate > 10%"
          description: "More than 10% of PDF generation attempts are failing."

      - alert: PDFGenerationSlow
        expr: >
          histogram_quantile(0.95, rate(erechnung_pdf_generation_duration_seconds_bucket[15m])) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "PDF generation is slow (p95 > 5s)"
          description: "95th percentile PDF generation time exceeds 5 seconds."

      - alert: XMLValidationErrors
        expr: rate(erechnung_xml_validation_errors_total[15m]) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High XML validation error rate"
          description: "XML validation errors are occurring frequently."

  # =====================================================================
  # Infrastructure
  # =====================================================================
  - name: erechnung_infrastructure
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter has been unreachable for over 1 minute."

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis exporter has been unreachable for over 1 minute."

      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High PostgreSQL connection count ({{ $value }})"
          description: "PostgreSQL has more than 80 active connections."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 85%"
          description: "Redis is using more than 85% of its configured maximum memory."

      - alert: HighCeleryTaskFailureRate
        expr: >
          rate(erechnung_celery_task_total{result="failure"}[15m])
          / rate(erechnung_celery_task_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Celery task failure rate > 10%"
          description: "More than 10% of Celery tasks are failing."
