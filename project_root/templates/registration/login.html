<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Login – eRechnung</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.15); padding: 40px; width: 340px; }
    h1 { font-size: 18pt; margin-bottom: 24px; color: #1d4ed8; }
    label { display: block; font-size: 9pt; font-weight: bold; margin-bottom: 4px; color: #374151; }
    input[type=text], input[type=password] { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 10pt; box-sizing: border-box; margin-bottom: 14px; }
    button { width: 100%; background: #1d4ed8; color: #fff; border: none; border-radius: 4px; padding: 10px; font-size: 11pt; cursor: pointer; }
    button:hover { background: #1e40af; }
    .error { background: #fee2e2; color: #b91c1c; padding: 8px 12px; border-radius: 4px; font-size: 9pt; margin-bottom: 14px; }
    .hint { margin-top: 16px; font-size: 8.5pt; color: #6b7280; text-align: center; }
    .hint a { color: #1d4ed8; }
  </style>
</head>
<body>
<div class="card">
  <h1>eRechnung Login</h1>
  <form method="post">
    {% csrf_token %}
    {% if form.errors %}
      <div class="error">Benutzername oder Passwort falsch.</div>
    {% endif %}
    <label for="id_username">Benutzername</label>
    {{ form.username }}
    <label for="id_password">Passwort</label>
    {{ form.password }}
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit">Anmelden</button>
  </form>
  <div class="hint">
    Oder direkt zum <a href="/admin/">Django Admin</a>
  </div>
</div>
</body>
</html>
