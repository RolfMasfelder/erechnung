{% extends 'base.html' %}

{% block title %}eRechnung - Home{% endblock %}

{% block content %}
<div class="container mt-5 text-center">
    <h1>Welcome to eRechnung</h1>
    <p>Loading the application...</p>

    <output class="spinner-border text-primary mt-3">
        <span class="visually-hidden">Loading...</span>
    </output>

    <script>
        // Redirect to home page after a short delay
        setTimeout(function() {
            window.location.href = "{% url 'home' %}";
        }, 1000);
    </script>
</div>
{% endblock %}
